name: Run Doctests

on:
  push:
    branches: ['*']

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git user
        run: |
          git config user.email "ci@docchat.test"
          git config user.name "docchat CI"

      - name: Install dependencies
        run: |
          pip install pytest coverage python-dotenv groq gitpython openai

      - name: Run doctests with coverage
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          coverage run -m pytest chat.py tools/ --doctest-modules
          coverage report -m

      - name: Update coverage badge in README
        run: |
          PCT=$(coverage report | tail -1 | awk '{print $NF}' | tr -d '%')
          if [ "$PCT" -ge 90 ]; then
            COLOR="brightgreen"
          elif [ "$PCT" -ge 75 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          BADGE="![Coverage](https://img.shields.io/badge/coverage-${PCT}%25-${COLOR})"
          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-[^)]*)|${BADGE}|" README.md

      - name: Commit and push badge update
        run: |
          git add README.md
          git diff --cached --quiet \
            && echo "Coverage badge unchanged — nothing to commit." \
            || (git commit -m "chore: update coverage badge [skip ci]" && git push)
